<style>
  :root {
    --gold: #8B7335;
    --gold-light: #B8985A;
    --gold-dark: #6B5826;
    --bg: #f5f5f5;
    --surface: #ffffff;
    --surface-alt: #fafafa;
    --border: #e0e0e0;
    --border-dark: #c0c0c0;
    --text: #1a1a1a;
    --text-muted: #666;
    --text-soft: #999;
    --silver: #c8c8c8;
    --grey: #8a8a8a;
    --grey-dark: #3a3a3a;
    --highlight: #fff8e1;
    --win-bg: #fef6dc;
    --win-border: #8B7335;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; font-size: 14px; line-height: 1.5; }

  header.page {
    background: var(--surface);
    border-bottom: 2px solid var(--gold);
    padding: 40px 24px 32px;
    text-align: center;
  }
  header.page .eyebrow {
    font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase;
    color: var(--gold); font-weight: 600; margin-bottom: 12px;
  }
  header.page h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 42px; font-weight: 500; color: var(--grey-dark);
    letter-spacing: -0.02em; margin-bottom: 8px;
  }
  header.page h1 em { color: var(--gold); font-style: italic; font-weight: 600; }
  header.page p { color: var(--text-muted); font-size: 13px; max-width: 640px; margin: 0 auto; }

  .tabs-bar {
    position: sticky; top: 0; z-index: 50;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex; gap: 0; overflow-x: auto;
  }
  .tab {
    padding: 14px 20px; font-size: 13px; font-weight: 500; color: var(--text-muted);
    cursor: pointer; border-bottom: 2px solid transparent;
    white-space: nowrap; letter-spacing: 0.05em; text-transform: uppercase;
    background: none; border-top: none; border-left: none; border-right: none;
    font-family: inherit;
  }
  .tab.active { color: var(--gold); border-bottom-color: var(--gold); }
  .tab:hover:not(.active) { color: var(--grey-dark); }

  main { max-width: 1600px; margin: 0 auto; padding: 28px 20px 80px; }

  /* Stats strip */
  .stats {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px; margin-bottom: 24px;
  }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    padding: 16px 18px; border-left: 3px solid var(--gold);
  }
  .stat-card .label {
    font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--text-muted); font-weight: 600; margin-bottom: 6px;
  }
  .stat-card .value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px; font-weight: 600; color: var(--grey-dark);
    line-height: 1.1;
  }
  .stat-card .sub { font-size: 11px; color: var(--text-soft); margin-top: 2px; }

  /* Controls */
  .controls {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 20px 24px;
    margin-bottom: 0;
    display: grid;
    gap: 16px;
  }
  .controls-row {
    display: grid;
    grid-template-columns: 1fr auto auto auto;
    gap: 12px; align-items: end;
  }
  @media (max-width: 900px) {
    .controls-row { grid-template-columns: 1fr; }
  }

  .field label {
    display: block; font-size: 10px; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--text-muted);
    font-weight: 600; margin-bottom: 6px;
  }
  .field input, .field select {
    width: 100%; padding: 10px 12px; font-size: 14px;
    border: 1px solid var(--border-dark); background: var(--surface);
    color: var(--text); font-family: inherit;
    transition: border-color 0.15s;
  }
  .field input:focus, .field select:focus {
    outline: none; border-color: var(--gold);
  }
  .field.search input {
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%238B7335' stroke-width='2' stroke-linecap='round'><circle cx='11' cy='11' r='8'/><line x1='21' y1='21' x2='16.65' y2='16.65'/></svg>");
    background-repeat: no-repeat;
    background-position: 12px center;
    padding-left: 36px;
  }

  .supplier-filters {
    display: flex; flex-wrap: wrap; gap: 8px;
    padding: 16px 24px;
    background: var(--surface); border: 1px solid var(--border); border-top: none;
  }
  .supplier-chip {
    padding: 6px 14px; font-size: 12px; font-weight: 500;
    border: 1px solid var(--border-dark); background: var(--surface);
    color: var(--text-muted); cursor: pointer;
    letter-spacing: 0.05em; font-family: inherit;
    transition: all 0.15s;
  }
  .supplier-chip.active {
    background: var(--gold); border-color: var(--gold); color: #ffffff;
  }
  .supplier-chip:hover:not(.active) { border-color: var(--gold); color: var(--gold); }

  /* Comparison table */
  .table-wrap {
    background: var(--surface); border: 1px solid var(--border); border-top: none;
    overflow-x: auto;
  }
  table.compare {
    width: 100%; border-collapse: collapse; font-size: 13px;
    min-width: 800px;
  }
  table.compare thead th {
    background: var(--grey-dark); color: #fff;
    font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase;
    font-weight: 600; padding: 14px 10px; text-align: left;
    position: sticky; top: 48px; z-index: 10; /* below tab bar */
  }
  table.compare thead th.supplier-col {
    text-align: center;
    border-left: 1px solid rgba(255,255,255,0.15);
  }
  table.compare tbody td {
    padding: 12px 10px; border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  table.compare tbody tr:hover { background: var(--surface-alt); }
  table.compare tbody tr.expanded { background: var(--surface-alt); }
  table.compare .peptide-name {
    font-weight: 600; color: var(--grey-dark); font-size: 14px;
    cursor: pointer;
  }
  table.compare .peptide-name:hover { color: var(--gold); }
  table.compare .dose {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px; font-weight: 500; color: var(--gold);
    white-space: nowrap;
  }
  table.compare .price-cell {
    text-align: center; border-left: 1px solid var(--border);
    font-variant-numeric: tabular-nums;
  }
  table.compare .price-cell.empty { color: var(--text-soft); font-style: italic; }
  table.compare .price-cell .kit-price {
    font-weight: 600; font-size: 14px; color: var(--text);
  }
  table.compare .price-cell .per-mg {
    font-size: 11px; color: var(--text-muted); margin-top: 2px;
  }
  table.compare .price-cell.best {
    background: var(--win-bg);
    border-left: 1px solid var(--gold);
  }
  table.compare .price-cell.best .kit-price { color: var(--gold-dark); }
  table.compare .price-cell.best .per-mg { color: var(--gold); font-weight: 600; }
  table.compare .price-cell .best-badge {
    display: inline-block;
    font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--gold); font-weight: 700;
    margin-top: 3px;
  }

  /* Tier detail row */
  .tier-details {
    background: var(--surface-alt);
    padding: 14px 16px 18px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  .tier-details h4 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px; font-weight: 600; color: var(--grey-dark);
    margin-bottom: 10px; letter-spacing: 0.02em;
  }
  .tier-details .supplier-detail {
    display: grid;
    grid-template-columns: 140px 1fr auto;
    gap: 12px; padding: 10px 0;
    border-bottom: 1px solid var(--border);
    align-items: center;
  }
  .tier-details .supplier-detail:last-child { border-bottom: none; }
  .tier-details .supplier-name {
    font-weight: 600; color: var(--grey-dark); font-size: 13px;
  }
  .tier-details .tier-grid {
    display: flex; flex-wrap: wrap; gap: 14px; font-size: 12px;
  }
  .tier-details .tier-pill {
    padding: 4px 10px; background: var(--surface);
    border: 1px solid var(--border-dark);
    border-radius: 2px;
    font-variant-numeric: tabular-nums;
  }
  .tier-details .tier-pill strong { color: var(--gold-dark); }
  .tier-details .supplier-notes {
    font-size: 11px; color: var(--text-muted); font-style: italic; margin-top: 4px;
  }
  .tier-details .supplier-code {
    font-size: 11px; color: var(--text-soft); font-family: monospace;
  }

  /* Empty state */
  .empty-state {
    padding: 60px 20px; text-align: center; color: var(--text-muted);
    font-family: 'Cormorant Garamond', serif; font-size: 22px;
  }

  /* Supplier summary tab */
  .supplier-cards {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }
  .supplier-card {
    background: var(--surface); border: 1px solid var(--border);
    border-top: 3px solid var(--gold);
    padding: 20px;
  }
  .supplier-card h3 {
    font-family: 'Cormorant Garamond', serif; font-size: 24px;
    font-weight: 600; color: var(--grey-dark); margin-bottom: 4px;
  }
  .supplier-card .sub {
    font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--gold); font-weight: 600; margin-bottom: 14px;
  }
  .supplier-card .stat-row {
    display: flex; justify-content: space-between;
    padding: 8px 0; border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .supplier-card .stat-row:last-child { border-bottom: none; }
  .supplier-card .stat-row .label { color: var(--text-muted); }
  .supplier-card .stat-row .val { font-weight: 600; color: var(--grey-dark); }

  /* Winners tab */
  .winners-list {
    background: var(--surface); border: 1px solid var(--border);
  }
  .winner-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr 100px;
    gap: 12px; padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    align-items: center;
    font-size: 13px;
  }
  .winner-row:last-child { border-bottom: none; }
  .winner-row.header {
    background: var(--grey-dark); color: #fff;
    font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase;
    font-weight: 600;
  }
  .winner-row .peptide-label {
    font-weight: 600; color: var(--grey-dark);
  }
  .winner-row .dose-label {
    font-family: 'Cormorant Garamond', serif; color: var(--gold); font-size: 15px;
  }
  .winner-row .winner-badge {
    display: inline-block;
    padding: 4px 10px; background: var(--win-bg);
    border: 1px solid var(--gold);
    color: var(--gold-dark); font-weight: 600; font-size: 12px;
    font-variant-numeric: tabular-nums;
  }
  .winner-row .savings {
    color: #3a6a2a; font-weight: 600; font-variant-numeric: tabular-nums;
  }

  @media (max-width: 720px) {
    header.page h1 { font-size: 32px; }
    .winner-row { grid-template-columns: 1fr 80px; font-size: 12px; }
    .winner-row .dose-label, .winner-row .savings, .winner-row .winner-badge { display: none; }
    .winner-row.header span:not(:first-child):not(:nth-child(5)) { display: none; }
  }

  .view { display: none; }
  .view.active { display: block; }
</style>
</head>

<header class="page">
  <div class="eyebrow">BioLinked — Supplier Intelligence</div>
  <h1>Peptide Price <em>Comparison</em></h1>
  <p>Cross-reference pricing, dosage, and price-per-mg across all active suppliers. Identify the best source for every compound in your catalog.</p>
</header>

<nav class="tabs-bar">
  <button class="tab active" data-view="compare">Compare Prices</button>
  <button class="tab" data-view="winners">Best Deals</button>
  <button class="tab" data-view="suppliers">Supplier Overview</button>
</nav>

<main>
  <!-- COMPARE VIEW -->
  <div class="view active" id="view-compare">
    <div class="stats" id="stats-strip"></div>

    <div class="controls">
      <div class="controls-row">
        <div class="field search">
          <label>Search Peptide</label>
          <input type="text" id="search" placeholder="e.g. BPC, Retatrutide, Tirz...">
        </div>
        <div class="field">
          <label>Sort By</label>
          <select id="sort-by">
            <option value="name">Name (A–Z)</option>
            <option value="best-price">Best Price (Low to High)</option>
            <option value="biggest-gap">Biggest Price Gap</option>
            <option value="most-available">Most Suppliers</option>
          </select>
        </div>
        <div class="field">
          <label>Price Tier</label>
          <select id="price-tier">
            <option value="1">1 Kit (Single Order)</option>
            <option value="2">Mid Volume (3–10 Kits)</option>
            <option value="3">High Volume (50+ Kits)</option>
            <option value="4">Max Volume (100+ Kits)</option>
          </select>
        </div>
        <div class="field">
          <label>&nbsp;</label>
          <button id="reset-btn" style="padding:10px 18px; background:var(--grey-dark); color:#fff; border:none; font-size:12px; letter-spacing:0.1em; text-transform:uppercase; cursor:pointer; font-family:inherit; font-weight:600;">Reset</button>
        </div>
      </div>
    </div>

    <div class="supplier-filters" id="supplier-filters"></div>

    <div class="table-wrap">
      <table class="compare">
        <thead>
          <tr id="table-head"></tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </div>

  <!-- WINNERS VIEW -->
  <div class="view" id="view-winners">
    <div class="stats" style="margin-bottom:0;">
      <div class="stat-card">
        <div class="label">What This Shows</div>
        <div class="value" style="font-size:18px; line-height:1.3;">Lowest price-per-mg<br>for each peptide</div>
        <div class="sub">Across all suppliers at base (1-kit) pricing</div>
      </div>
    </div>
    <div class="winners-list" id="winners-list" style="margin-top:20px;"></div>
  </div>

  <!-- SUPPLIERS VIEW -->
  <div class="view" id="view-suppliers">
    <div class="supplier-cards" id="supplier-cards"></div>
  </div>
</main>

  const SUPPLIERS = ["Peptide Pole", "APS", "ERP", "HYB", "MIX", "Aurora", "Maddox", "ZJ"];

  const SUPPLIER_NOTES = {
    "Peptide Pole": "Hong Kong • Broad catalog",
    "APS": "Andy Peps China Warehouse",
    "ERP": "Shanghai ERP • Tiered pricing",
    "HYB": "Yura • US warehouse option",
    "MIX": "Curated core catalog",
    "Aurora": "Shenzhen Aurora Biotech",
    "Maddox": "US Domestic • 3-day ship",
    "ZJ": "Zenith Jove • Tirz up to 120mg"
  };

  let state = {
    search: "",
    sortBy: "name",
    tier: "1",
    activeSuppliers: new Set(SUPPLIERS),
    expandedRow: null,
  };

  // --- Helpers ---
  function getPriceForTier(s, tier) {
    if (!s) return null;
    if (tier === "1") return s.price;
    if (tier === "2") return s.tier2 ?? s.price;
    if (tier === "3") return s.tier3 ?? s.tier2 ?? s.price;
    if (tier === "4") return s.tier4 ?? s.tier3 ?? s.tier2 ?? s.price;
    return s.price;
  }

  function pricePerMg(price, dose, unit) {
    if (unit !== "mg" || !price || !dose) return null;
    return price / dose;
  }

  function fmtPrice(p) { return p == null ? "—" : "$" + Number(p).toFixed(p % 1 === 0 ? 0 : 2); }
  function fmtPerMg(v) { return v == null ? "" : "$" + v.toFixed(2) + "/mg"; }

  function getBestSupplier(row, tier) {
    let best = null;
    for (const sName of SUPPLIERS) {
      if (!state.activeSuppliers.has(sName)) continue;
      const s = row.suppliers[sName];
      if (!s) continue;
      const price = getPriceForTier(s, tier);
      if (price == null) continue;
      const perMg = pricePerMg(price, row.dose, row.unit);
      // For non-mg items (iu, ml), use price directly
      const metric = perMg ?? price;
      if (best == null || metric < best.metric) {
        best = { supplier: sName, price, perMg, metric };
      }
    }
    return best;
  }

  // --- Render ---
  function renderTabs() {
    document.querySelectorAll(".tab").forEach(t => {
      t.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
        document.querySelectorAll(".view").forEach(x => x.classList.remove("active"));
        t.classList.add("active");
        document.getElementById("view-" + t.dataset.view).classList.add("active");
        if (t.dataset.view === "winners") renderWinners();
        if (t.dataset.view === "suppliers") renderSupplierCards();
      });
    });
  }

  function renderStats() {
    const total = DATA.length;
    const totalEntries = DATA.reduce((sum, r) => sum + Object.keys(r.suppliers).length, 0);
    const avgSuppliers = (totalEntries / total).toFixed(1);

    // Count unique peptides (ignore dose variants)
    const uniquePeptides = new Set(DATA.map(r => r.peptide));

    document.getElementById("stats-strip").innerHTML = `
      <div class="stat-card">
        <div class="label">Active Suppliers</div>
        <div class="value">${SUPPLIERS.length}</div>
        <div class="sub">Across HK, China, US sources</div>
      </div>
      <div class="stat-card">
        <div class="label">Unique Peptides</div>
        <div class="value">${uniquePeptides.size}</div>
        <div class="sub">${total} dose variants tracked</div>
      </div>
      <div class="stat-card">
        <div class="label">Total SKUs</div>
        <div class="value">${totalEntries}</div>
        <div class="sub">Avg ${avgSuppliers} sources per item</div>
      </div>
      <div class="stat-card">
        <div class="label">Price Tiers</div>
        <div class="value">4</div>
        <div class="sub">From single kit to 100+ volume</div>
      </div>
    `;
  }

  function renderSupplierFilters() {
    const container = document.getElementById("supplier-filters");
    container.innerHTML = SUPPLIERS.map(s =>
      `<button class="supplier-chip ${state.activeSuppliers.has(s) ? 'active' : ''}" data-sup="${s}">${s}</button>`
    ).join("");
    container.querySelectorAll(".supplier-chip").forEach(btn => {
      btn.addEventListener("click", () => {
        const sup = btn.dataset.sup;
        if (state.activeSuppliers.has(sup)) state.activeSuppliers.delete(sup);
        else state.activeSuppliers.add(sup);
        renderSupplierFilters();
        renderTable();
      });
    });
  }

  function renderTable() {
    const head = document.getElementById("table-head");
    const body = document.getElementById("table-body");

    const activeSuppliers = SUPPLIERS.filter(s => state.activeSuppliers.has(s));

    head.innerHTML = `
      <th style="min-width:180px;">Peptide</th>
      <th style="min-width:80px;">Dose</th>
      ${activeSuppliers.map(s => `<th class="supplier-col">${s}</th>`).join("")}
    `;

    // Filter + sort
    let rows = DATA.filter(r => {
      const q = state.search.toLowerCase().trim();
      if (q && !r.peptide.toLowerCase().includes(q)) return false;
      // Must have at least one active supplier with data
      const hasActive = activeSuppliers.some(s => r.suppliers[s]);
      return hasActive;
    });

    if (state.sortBy === "name") {
      rows.sort((a, b) => a.peptide.localeCompare(b.peptide) || a.dose - b.dose);
    } else if (state.sortBy === "best-price") {
      rows.sort((a, b) => {
        const ba = getBestSupplier(a, state.tier);
        const bb = getBestSupplier(b, state.tier);
        if (!ba) return 1; if (!bb) return -1;
        return ba.price - bb.price;
      });
    } else if (state.sortBy === "biggest-gap") {
      rows.sort((a, b) => {
        const getGap = (r) => {
          const prices = activeSuppliers
            .map(s => r.suppliers[s] ? getPriceForTier(r.suppliers[s], state.tier) : null)
            .filter(p => p != null);
          if (prices.length < 2) return 0;
          return Math.max(...prices) - Math.min(...prices);
        };
        return getGap(b) - getGap(a);
      });
    } else if (state.sortBy === "most-available") {
      rows.sort((a, b) => {
        const ca = activeSuppliers.filter(s => a.suppliers[s]).length;
        const cb = activeSuppliers.filter(s => b.suppliers[s]).length;
        return cb - ca;
      });
    }

    if (rows.length === 0) {
      body.innerHTML = `<tr><td colspan="${activeSuppliers.length + 2}"><div class="empty-state">No products match your filters.</div></td></tr>`;
      return;
    }

    body.innerHTML = rows.map((r, i) => {
      const best = getBestSupplier(r, state.tier);
      const rowId = `${r.peptide}-${r.dose}${r.unit}`;
      const isExpanded = state.expandedRow === rowId;

      const supplierCells = activeSuppliers.map(sName => {
        const s = r.suppliers[sName];
        if (!s) return `<td class="price-cell empty">—</td>`;
        const price = getPriceForTier(s, state.tier);
        const perMg = pricePerMg(price, r.dose, r.unit);
        const isBest = best && best.supplier === sName;
        return `
          <td class="price-cell ${isBest ? 'best' : ''}">
            <div class="kit-price">${fmtPrice(price)}</div>
            ${perMg ? `<div class="per-mg">${fmtPerMg(perMg)}</div>` : ''}
            ${isBest && activeSuppliers.length > 1 ? '<div class="best-badge">★ Best</div>' : ''}
          </td>
        `;
      }).join("");

      let detailHtml = "";
      if (isExpanded) {
        const detailContent = SUPPLIERS
          .filter(sName => state.activeSuppliers.has(sName) && r.suppliers[sName])
          .map(sName => {
            const s = r.suppliers[sName];
            const tiers = [];
            if (s.price != null) tiers.push(`<span class="tier-pill">1 kit: <strong>$${s.price}</strong></span>`);
            if (s.tier2 != null) tiers.push(`<span class="tier-pill">Tier 2: <strong>$${s.tier2}</strong></span>`);
            if (s.tier3 != null) tiers.push(`<span class="tier-pill">Tier 3: <strong>$${s.tier3}</strong></span>`);
            if (s.tier4 != null) tiers.push(`<span class="tier-pill">Tier 4: <strong>$${s.tier4}</strong></span>`);
            if (s.per_vial != null) tiers.push(`<span class="tier-pill">Per vial: <strong>$${s.per_vial}</strong></span>`);
            return `
              <div class="supplier-detail">
                <div>
                  <div class="supplier-name">${sName}</div>
                  ${s.code ? `<div class="supplier-code">${s.code}</div>` : ''}
                </div>
                <div>
                  <div class="tier-grid">${tiers.join("")}</div>
                  ${s.notes ? `<div class="supplier-notes">${s.notes}</div>` : ''}
                </div>
                <div></div>
              </div>
            `;
          }).join("");
        detailHtml = `
          <tr>
            <td colspan="${activeSuppliers.length + 2}" style="padding:0;">
              <div class="tier-details">
                <h4>${r.peptide} — ${r.dose}${r.unit} • All Tier Pricing</h4>
                ${detailContent}
              </div>
            </td>
          </tr>
        `;
      }

      return `
        <tr class="${isExpanded ? 'expanded' : ''}" data-row-id="${rowId}">
          <td><span class="peptide-name">${r.peptide}</span></td>
          <td><span class="dose">${r.dose}${r.unit}</span></td>
          ${supplierCells}
        </tr>
        ${detailHtml}
      `;
    }).join("");

    // Click handler for expanding rows
    body.querySelectorAll("tr[data-row-id]").forEach(tr => {
      tr.addEventListener("click", () => {
        const id = tr.dataset.rowId;
        state.expandedRow = state.expandedRow === id ? null : id;
        renderTable();
      });
    });
  }

  function renderWinners() {
    const container = document.getElementById("winners-list");
    const rows = DATA.map(r => {
      const best = getBestSupplier(r, "1");
      if (!best) return null;
      // Calc max price among active suppliers for savings %
      const prices = SUPPLIERS
        .filter(s => state.activeSuppliers.has(s))
        .map(s => r.suppliers[s] ? getPriceForTier(r.suppliers[s], "1") : null)
        .filter(p => p != null);
      const max = prices.length > 1 ? Math.max(...prices) : null;
      const savings = max && max > best.price ? ((max - best.price) / max * 100).toFixed(0) : null;
      return { ...r, best, max, savings };
    }).filter(x => x != null);

    // Sort by biggest savings
    rows.sort((a, b) => {
      const sa = a.savings == null ? -1 : Number(a.savings);
      const sb = b.savings == null ? -1 : Number(b.savings);
      return sb - sa;
    });

    container.innerHTML = `
      <div class="winner-row header">
        <span>Peptide</span>
        <span>Dose</span>
        <span>Cheapest Supplier</span>
        <span>Best Price</span>
        <span>Savings</span>
      </div>
      ${rows.map(r => `
        <div class="winner-row">
          <div class="peptide-label">${r.peptide}</div>
          <div class="dose-label">${r.dose}${r.unit}</div>
          <div style="color:var(--grey-dark); font-weight:600;">${r.best.supplier}</div>
          <div><span class="winner-badge">${fmtPrice(r.best.price)}${r.best.perMg ? ` · ${fmtPerMg(r.best.perMg)}` : ''}</span></div>
          <div class="savings">${r.savings != null ? r.savings + '% off' : (r.max == null ? 'Only source' : '—')}</div>
        </div>
      `).join("")}
    `;
  }

  function renderSupplierCards() {
    const container = document.getElementById("supplier-cards");
    container.innerHTML = SUPPLIERS.map(sName => {
      // Compute stats
      const entries = DATA.filter(r => r.suppliers[sName]);
      const catalogSize = entries.length;
      // Avg price per mg (only for mg items with valid perMg)
      const perMgs = entries
        .map(r => {
          const s = r.suppliers[sName];
          const price = getPriceForTier(s, "1");
          return pricePerMg(price, r.dose, r.unit);
        })
        .filter(v => v != null);
      const avgPerMg = perMgs.length ? (perMgs.reduce((a, b) => a + b, 0) / perMgs.length).toFixed(2) : "—";

      // How many "best price" wins
      let wins = 0;
      DATA.forEach(r => {
        const best = getBestSupplier(r, "1");
        if (best && best.supplier === sName) wins++;
      });

      return `
        <div class="supplier-card">
          <h3>${sName}</h3>
          <div class="sub">${SUPPLIER_NOTES[sName] || ''}</div>
          <div class="stat-row"><span class="label">Catalog Size</span><span class="val">${catalogSize} items</span></div>
          <div class="stat-row"><span class="label">Avg $/mg</span><span class="val">${avgPerMg === "—" ? "—" : "$" + avgPerMg}</span></div>
          <div class="stat-row"><span class="label">Lowest-Price Wins</span><span class="val">${wins}</span></div>
          <div class="stat-row"><span class="label">Win Rate</span><span class="val">${((wins / DATA.length) * 100).toFixed(0)}%</span></div>
        </div>
      `;
    }).join("");
  }

  // --- Wire up controls ---
  document.getElementById("search").addEventListener("input", (e) => {
    state.search = e.target.value;
    renderTable();
  });
  document.getElementById("sort-by").addEventListener("change", (e) => {
    state.sortBy = e.target.value;
    renderTable();
  });
  document.getElementById("price-tier").addEventListener("change", (e) => {
    state.tier = e.target.value;
    renderTable();
  });
  document.getElementById("reset-btn").addEventListener("click", () => {
    state = {
      search: "", sortBy: "name", tier: "1",
      activeSuppliers: new Set(SUPPLIERS), expandedRow: null,
    };
    document.getElementById("search").value = "";
    document.getElementById("sort-by").value = "name";
    document.getElementById("price-tier").value = "1";
    renderSupplierFilters();
    renderTable();
  });

  // --- Initial render ---
  renderTabs();
  renderStats();
  renderSupplierFilters();
  renderTable();
</script>

<script src="/nav.js" defer></script>
</body>
</html>
